<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0e1a">
<title>밸런스 게임 🍷</title>
<style>
  :root{
    --bg-deep: #0a0d16;
    --bg-charcoal: #14161f;
    --card: #1a1d2b;
    --card-border: rgba(255,255,255,0.06);
    --text: #eef0f6;
    --text-dim: #8b8fa3;
    --rose: #ff3b5c;
    --rose-soft: #ff6b81;
    --rose-glow: rgba(255,59,92,0.45);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    margin: 0;
    overscroll-behavior: none;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", "Malgun Gothic", sans-serif;
    background: radial-gradient(circle at 30% 0%, #1c2033 0%, var(--bg-deep) 55%, var(--bg-charcoal) 100%);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: max(20px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom));
    -webkit-user-select: none;
    user-select: none;
  }

  .app {
    width: 100%;
    max-width: 420px;
  }

  .card {
    position: relative;
    background: linear-gradient(160deg, var(--card) 0%, #12141f 100%);
    border: 1px solid var(--card-border);
    border-radius: 28px;
    padding: 28px 22px 26px;
    box-shadow:
      0 20px 60px rgba(0,0,0,0.55),
      0 0 0 1px rgba(255,255,255,0.02) inset;
    overflow: hidden;
  }

  .card::before{
    content:"";
    position:absolute;
    top:-60%; right:-40%;
    width: 260px; height: 260px;
    background: radial-gradient(circle, var(--rose-glow) 0%, transparent 70%);
    filter: blur(10px);
    pointer-events: none;
  }

  /* ---------- 상단 진행도 ---------- */
  .top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
    position: relative;
    z-index: 1;
  }

  .brand {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--text-dim);
  }

  .progress-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--rose-soft);
    letter-spacing: 0.03em;
  }

  .progress-track {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 26px;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--rose-soft), var(--rose));
    border-radius: 10px;
    transition: width 0.45s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 0 12px var(--rose-glow);
  }

  /* ---------- 질문 화면 ---------- */
  #question-screen {
    position: relative;
    z-index: 1;
  }

  .q-title {
    font-size: clamp(20px, 5.6vw, 24px);
    font-weight: 800;
    line-height: 1.4;
    text-align: center;
    margin: 6px 0 30px;
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .choices {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .choice-btn {
    position: relative;
    width: 100%;
    padding: 20px 18px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.08);
    background: linear-gradient(180deg, #232636 0%, #191c29 100%);
    color: var(--text);
    font-size: 16px;
    font-weight: 700;
    line-height: 1.35;
    text-align: left;
    cursor: pointer;
    box-shadow:
      0 8px 0 rgba(0,0,0,0.35),
      0 12px 20px rgba(0,0,0,0.35);
    transform: translateY(0);
    transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease, background .12s ease;
  }

  .choice-btn .tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 800;
    color: var(--rose-soft);
    background: rgba(255,59,92,0.12);
    padding: 3px 8px;
    border-radius: 8px;
    margin-bottom: 8px;
    letter-spacing: 0.04em;
  }

  .choice-btn:active,
  .choice-btn.pressed {
    transform: translateY(6px);
    box-shadow:
      0 2px 0 rgba(0,0,0,0.35),
      0 4px 10px rgba(0,0,0,0.3);
    border-color: var(--rose);
    background: linear-gradient(180deg, #2c2032 0%, #1e1926 100%);
  }

  .choice-btn.selected {
    border-color: var(--rose);
    box-shadow:
      0 2px 0 rgba(0,0,0,0.35),
      0 0 0 3px var(--rose-glow);
  }

  .vs-badge {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--rose), #b5183a);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 900;
    font-style: italic;
    color: #fff;
    box-shadow: 0 0 0 5px var(--bg-charcoal), 0 4px 16px var(--rose-glow);
    z-index: 2;
    letter-spacing: 0.02em;
  }

  /* ---------- 전환 애니메이션 ---------- */
  .fade-slide-enter {
    animation: enterAnim .38s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes enterAnim {
    from { opacity: 0; transform: translateX(24px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .fade-slide-exit {
    animation: exitAnim .22s ease forwards;
  }
  @keyframes exitAnim {
    from { opacity: 1; transform: translateX(0); }
    to   { opacity: 0; transform: translateX(-24px); }
  }

  /* ---------- 결과 화면 ---------- */
  #result-screen {
    display: none;
    position: relative;
    z-index: 1;
    text-align: center;
  }

  #result-screen.show {
    display: block;
    animation: enterAnim .4s cubic-bezier(.2,.8,.2,1);
  }

  .result-emoji {
    font-size: 52px;
    margin-bottom: 6px;
    filter: drop-shadow(0 0 14px var(--rose-glow));
  }

  .result-heading {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    margin-bottom: 10px;
  }

  .result-penalty {
    font-size: clamp(20px, 6vw, 25px);
    font-weight: 800;
    line-height: 1.5;
    background: linear-gradient(135deg, #fff, var(--rose-soft));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin: 10px 0 28px;
    padding: 0 4px;
  }

  .retry-btn {
    width: 100%;
    padding: 18px;
    border-radius: 18px;
    border: none;
    background: linear-gradient(135deg, var(--rose), #c21e42);
    color: #fff;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.02em;
    cursor: pointer;
    box-shadow: 0 10px 24px var(--rose-glow), 0 6px 0 #8f1530;
    transform: translateY(0);
    transition: transform .12s ease, box-shadow .12s ease;
  }

  .retry-btn:active {
    transform: translateY(6px);
    box-shadow: 0 4px 10px var(--rose-glow), 0 1px 0 #8f1530;
  }

  .footer-hint {
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    margin-top: 16px;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>

<div class="app">
  <div class="card">
    <div class="top-row">
      <span class="brand">심심해서 만들어 봤어요^^</span>
      <span class="progress-label" id="progress-label">Q 1 / 5</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <!-- 질문 화면 -->
    <div id="question-screen">
      <div class="q-title" id="q-title">질문을 불러오는 중...</div>
      <div class="choices">
        <button class="choice-btn" id="btn-a" onclick="selectAnswer('A')">
          <span class="tag">A</span>
          <div id="text-a"></div>
        </button>
        <div class="vs-badge">VS</div>
        <button class="choice-btn" id="btn-b" onclick="selectAnswer('B')">
          <span class="tag">B</span>
          <div id="text-b"></div>
        </button>
      </div>
    </div>

    <!-- 결과 화면 -->
    <div id="result-screen">
      <div class="result-emoji">🍻</div>
      <div class="result-heading">끝입니다</div>
      <div class="result-penalty" id="penalty-text"></div>
      <button class="retry-btn" onclick="restartGame()">🔄 다시 하기</button>
    </div>
  </div>
  <div class="footer-hint">못고르겠으면 한잔 하시오</div>
</div>

<script>
  // ------------------------------------------------------
  // 질문 데이터: 여기 배열만 수정하면 질문/개수를 바꿀 수 있음
  // ------------------------------------------------------
  const questions = [
    {
      title: "마춥범 어렴긴 헤요",
      a: "맞춤법 틀리면 지적하는 애인",
      b: "맞춤법 틀리는 애인"
    },
    {
      title: "ㅈㅉ 닥전아님?",
      a: "내가 양치 안하고 키스",
      b: "애인이 양치 안하고 키스"
    },
    {
      title: "아싸들 ㅉ",
      a: "나랑만 연락하는 아싸",
      b: "나포함 30명이랑 연락하는 인싸"
    },
    {
      title: "이건 오우.",
      a: "야동보다가 애인한테 걸리기",
      b: "부모님한테 걸리기 "
    },
    {
      title: "미쳐사는애인",
      a: "술",
      b: "담배"
    },
    {
      title: "전애인이랑... ",
      a: "짱친되기 ",
      b: "지금 애인이 내 전애인이랑 짱친되기"
    },
    {
      title: "데이트를",
      a: "1주일에 7번",
      b: "2달에 1번"
    },
    {
      title: "박효은처럼 안씻는데 ",
      a: "평생 샤워안하는 애인",
      b: "평생 머리 안감는 애인"
    },
    {
      title: "전애인을..",
      a: "내 애인의 전애인 소개받기",
      b: "내 전애인 애인에게 소개시켜주기"
    },
    {
      title: "전애인이랑 베프",
      a: "ㄱㄴ",
      b: "ㅗ"
    },
    {
      title: "슬픔이와 버럭이",
      a: "하루종일 우는 애인",
      b: "하루종일 화내는 애인"
    },
    {
      title: "애인이 바람을 폈는데",
      a: "평생 안들키고 비밀로 하는 연애(나는 모름)",
      b: "자백하고 용서를 구하는 애인"
    },
    {
      title: "그러다 걸려서 잘못했다고 싹싹빌면",
      a: "딱 한번은 봐준다 ",
      b: "ㅗㅗ"
    },
    {
      title: "그 바람난 상대가 ",
      a: "이성",
      b: "동성"
    },
    {
      title: "이건좀",
      a: "이성친구와 1박2일 여행가는 애인",
      b: "전애인과 밤새 술마시는 애인"
    },
    {
      title: "애인의 주량",
      a: "나랑 주량 똑같은 애인",
      b: "나보다 더 잘마시는 애인"
    },
    {
      title: "ㅈㅉ 이상형을 만났는데 ",
      a: "이혼전적 3회",
      b: "숨겨진 자녀3명"
    },
    
    {
      title: "바람둥이 vs 순애",
      a: "재산 100억 바람둥이",
      b: "빚 100억 노가다 3잡 순애"
    },
    {
      title: "최악의 이별은? (경험담 아님)",
      a: "잠수이별",
      b: "환승이별"
    }
    
   
   
  ];

  // 결과 화면에서 랜덤으로 뽑을 벌칙 목록 (자유롭게 추가/수정 가능)
  const penalties = [
    "막짠 ^^"
  ];

  let currentIndex = 0;
  const total = questions.length;

  const qTitle = document.getElementById('q-title');
  const textA = document.getElementById('text-a');
  const textB = document.getElementById('text-b');
  const btnA = document.getElementById('btn-a');
  const btnB = document.getElementById('btn-b');
  const progressLabel = document.getElementById('progress-label');
  const progressFill = document.getElementById('progress-fill');
  const questionScreen = document.getElementById('question-screen');
  const resultScreen = document.getElementById('result-screen');
  const penaltyText = document.getElementById('penalty-text');

  function vibrate(ms) {
    if (navigator.vibrate) navigator.vibrate(ms);
  }

  function renderQuestion() {
    const q = questions[currentIndex];
    progressLabel.textContent = `Q ${currentIndex + 1} / ${total}`;
    progressFill.style.width = `${((currentIndex) / total) * 100}%`;
    qTitle.textContent = q.title;
    textA.textContent = q.a;
    textB.textContent = q.b;
    btnA.classList.remove('selected');
    btnB.classList.remove('selected');

    questionScreen.classList.remove('fade-slide-enter', 'fade-slide-exit');
    void questionScreen.offsetWidth; // 리플로우 트리거로 애니메이션 재실행
    questionScreen.classList.add('fade-slide-enter');
  }

  function selectAnswer(choice) {
    vibrate(15);
    const chosenBtn = choice === 'A' ? btnA : btnB;
    chosenBtn.classList.add('selected');
    progressFill.style.width = `${((currentIndex + 1) / total) * 100}%`;

    questionScreen.classList.add('fade-slide-exit');

    setTimeout(() => {
      currentIndex++;
      if (currentIndex < total) {
        renderQuestion();
      } else {
        showResult();
      }
    }, 220);
  }

  function showResult() {
    questionScreen.style.display = 'none';
    const pick = penalties[Math.floor(Math.random() * penalties.length)];
    penaltyText.textContent = pick;
    resultScreen.classList.add('show');
    vibrate([10, 40, 10]);
  }

  function restartGame() {
    currentIndex = 0;
    resultScreen.classList.remove('show');
    questionScreen.style.display = 'block';
    renderQuestion();
  }

  renderQuestion();
</script>

</body>
</html>
